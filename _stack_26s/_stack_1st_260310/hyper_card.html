<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HyperCard Clone</title>
    <style>
        body {
            background-color: #AAAAAA; /* デスクトップの背景色風 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Chicago', 'Geneva', sans-serif; /* クラシックMac風フォント */
        }

        .stack {
            width: 512px;
            height: 342px; /* 初期Macの解像度 (512x342) */
            background-color: #FFFFFF;
            border: 2px solid #000000;
            position: relative;
            box-shadow: 2px 2px 0px #000000;
            overflow: hidden;
        }

        .card {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .card.active {
            display: block;
        }

        /* HyperCard風ボタン */
        .hc-button {
            background-color: #FFFFFF;
            border: 2px solid #000000;
            border-radius: 8px; /* 丸みを帯びた長方形ボタン */
            padding: 5px 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            color: #000;
            box-shadow: 1px 1px 0px #000000;
        }

        .hc-button:active {
            background-color: #000000;
            color: #FFFFFF;
            box-shadow: 0px 0px 0px #000000;
            transform: translate(1px, 1px);
        }

        .title {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 5px;
        }
        
        .nav-buttons {
            position: absolute;
            bottom: 20px;
            right: 20px;
        }
    </style>
</head>
<body>

    <div class="stack" id="myStack">
        <!-- Card 1 -->
        <div class="card active" id="card1">
            <h1 class="title">Home Card</h1>
            <p>これはHyperCard風の雛形です。</p>
            <div class="nav-buttons">
                <button class="hc-button" onclick="goToCard('card2')">Next ⇨</button>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="card" id="card2">
            <h1 class="title">Card 2</h1>
            <p>ボタンとリンクを配置してスタックを作ります。</p>
            <div class="nav-buttons">
                <button class="hc-button" onclick="goToCard('card1')">⇦ Prev</button>
                <button class="hc-button" onclick="goToCard('card3')">Next ⇨</button>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="card" id="card3">
            <h1 class="title">Card 3</h1>
            <p>JavaScriptで表示クラスを切り替えています。</p>
            <div class="nav-buttons">
                <button class="hc-button" onclick="goToCard('card2')">⇦ Prev</button>
                <button class="hc-button" onclick="goToCard('card1')">Home</button>
            </div>
        </div>
    </div>

    <script>
        function goToCard(targetCardId) {
            // すべてのカードを非表示にする
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => card.classList.remove('active'));

            // 指定されたカードを表示する
            const targetCard = document.getElementById(targetCardId);
            if (targetCard) {
                targetCard.classList.add('active');
            }
        }
    </script>
</body>
</html>
